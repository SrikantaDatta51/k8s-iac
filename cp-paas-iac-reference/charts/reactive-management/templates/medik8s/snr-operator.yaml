spec:
  ports:
  - name: https
    port: 8443
    targetPort: https
  selector:
    control-plane: controller-manager
    self-node-remediation-operator: ""
---
apiVersion: v1
kind: Service
metadata:
  labels:
    self-node-remediation-operator: ""
  name: self-node-remediation-webhook-service
  namespace: self-node-remediation
spec:
  ports:
  - port: 443
    targetPort: 9443
  selector:
    control-plane: controller-manager
    self-node-remediation-operator: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    control-plane: controller-manager
    self-node-remediation-operator: ""
  name: self-node-remediation-controller-manager
  namespace: self-node-remediation
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
      self-node-remediation-operator: ""
  template:
    metadata:
      labels:
        control-plane: controller-manager
        self-node-remediation-operator: ""
    spec:
      containers:
      - args:
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=127.0.0.1:8080
        - --leader-elect
        - --is-manager
        command:
        - /manager
        env:
        - name: MY_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: SELF_NODE_REMEDIATION_IMAGE
          value: ${IMG}
        - name: DEPLOYMENT_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: quay.io/medik8s/self-node-remediation-operator:v0.8.0
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 20m
            memory: 110Mi
        securityContext:
          allowPrivilegeEscalation: false
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
      priorityClassName: system-cluster-critical
      securityContext:
        runAsNonRoot: false
      serviceAccountName: self-node-remediation-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - name: cert
        secret:
          defaultMode: 420
          secretName: self-node-remediation-server-cert
---
