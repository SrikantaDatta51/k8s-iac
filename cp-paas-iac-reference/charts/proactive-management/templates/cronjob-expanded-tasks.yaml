apiVersion: batch/v1
kind: CronJob
metadata:
  name: hourly-pod-hygiene
  namespace: proactive-maintenance
spec:
  schedule: {{ .Values.schedules.cleanupPodHygiene | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: maintenance-sa
          restartPolicy: Never
          containers:
            - name: runner
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              command: ["/bin/bash", "/scripts/cleanup-pod-hygiene.sh"]
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
          volumes:
            - name: scripts
              configMap:
                name: maintenance-scripts
---
