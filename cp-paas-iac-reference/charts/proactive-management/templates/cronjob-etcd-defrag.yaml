apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-defrag-rolling
  namespace: proactive-maintenance
spec:
  schedule: {{ .Values.schedules.etcdDefrag | quote }}
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          serviceAccountName: maintenance-sa
          restartPolicy: Never
          containers:
            - name: runner
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["/bin/bash", "/scripts/etcd-defrag.sh"]
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
          volumes:
            - name: scripts
              configMap:
                name: maintenance-scripts
