apiVersion: v1
kind: ConfigMap
metadata:
  name: maintenance-scripts
  namespace: proactive-maintenance
data:
  # -------------------------------------------------------------------------
  # Common Lib
  # -------------------------------------------------------------------------
  lib.sh: |
    #!/bin/bash
    log() {
      echo "[$(date +'%Y-%m-%dT%H:%M:%S%z')] [$1] $2"
    }
    
    check_deps() {
      for cmd in "$@"; do
        if ! command -v "$cmd" &> /dev/null; then
          log "ERROR" "Missing required command: $cmd"
          exit 1
        fi
      done
    }

  # -------------------------------------------------------------------------
  # 1. Etcd Snapshot
  # -------------------------------------------------------------------------
  etcd-snapshot.sh: |
    #!/bin/bash
    set -e
    source /scripts/lib.sh
    check_deps etcdctl

    ETCDCTL_API=3
    ENDPOINTS="{{ .Values.config.etcd.endpoints }}"
    BACKUP_DIR="{{ .Values.config.etcd.backupDir }}"
    RETENTION="{{ .Values.config.etcd.retentionDays }}"
    CACERT="{{ .Values.config.etcd.caFile }}"
    CERT="{{ .Values.config.etcd.certFile }}"
    KEY="{{ .Values.config.etcd.keyFile }}"

    # Create backup dir if missing
    mkdir -p "$BACKUP_DIR"
    
    TIMESTAMP=$(date +%Y%m%d-%H%M%S)
    FILENAME="$BACKUP_DIR/etcd-snapshot-$TIMESTAMP.db"

    log "INFO" "Starting Etcd Snapshot..."
    log "INFO" "Target: $FILENAME"

    if etcdctl --endpoints="$ENDPOINTS" \
         --cacert="$CACERT" --cert="$CERT" --key="$KEY" \
         snapshot save "$FILENAME"; then
       log "INFO" "Snapshot created successfully."
       log "INFO" "Size: $(du -h $FILENAME | cut -f1)"
    else
       log "ERROR" "Snapshot failed!"
       exit 1
    fi

    log "INFO" "Pruning snapshots older than $RETENTION days..."
    find "$BACKUP_DIR" -name "etcd-snapshot-*.db" -mtime +$RETENTION -print -delete
    log "INFO" "Cleanup complete."

  # -------------------------------------------------------------------------
  # 2. Etcd Rolling Defrag
  # -------------------------------------------------------------------------
  etcd-defrag.sh: |
    #!/bin/bash
    set -e
    source /scripts/lib.sh
    check_deps etcdctl jq curl

    ETCDCTL_API=3
    # Note: We rely on K8s DNS to resolve endpoints for individual access
    # Logic: Get Member List -> Find Leader -> Defrag Others -> Defrag Leader
    
    CACERT="{{ .Values.config.etcd.caFile }}"
    CERT="{{ .Values.config.etcd.certFile }}"
    KEY="{{ .Values.config.etcd.keyFile }}"
    
    log "INFO" "Fetching Etcd Members..."
    # Simplified: Assuming endpoints passed via Values, but for Defrag we often check member list
    # For robust rolling, we use the member list from API
    
    MEMBERS_JSON=$(etcdctl --endpoints="{{ .Values.config.etcd.endpoints }}" \
         --cacert="$CACERT" --cert="$CERT" --key="$KEY" \
         member list -w json)
    
    # Extract Client URLs
    URLS=$(echo "$MEMBERS_JSON" | jq -r '.members[].clientURLs[]')

    # Detect Leader
    STATUS_JSON=$(etcdctl --endpoints="{{ .Values.config.etcd.endpoints }}" \
         --cacert="$CACERT" --cert="$CERT" --key="$KEY" \
         endpoint status -w json)
    LEADER_ID=$(echo "$STATUS_JSON" | jq -r '.[].Status.leader')
    
    log "INFO" "Defragging Followers first..."
    
    for url in $URLS; do
        # Check if this endpoint is the leader (requires correlating MemberID, simplified here to just run)
        # Production scripts often check 'endpoint status' per URL to see IsLeader
        
        IS_LEADER=$(etcdctl --endpoints="$url" --cacert="$CACERT" --cert="$CERT" --key="$KEY" endpoint status -w json | jq -r '.[].Status.header.member_id == .[].Status.leader')
        
        if [ "$IS_LEADER" == "true" ]; then
            log "INFO" "Skipping Leader ($url) for now..."
            LEADER_URL="$url"
        else
            log "INFO" "Defragging Follower: $url"
            etcdctl --endpoints="$url" --cacert="$CACERT" --cert="$CERT" --key="$KEY" defrag
            log "INFO" "Pausing 5s for sync..."
            sleep 5
        fi
    done
    
    if [ -n "$LEADER_URL" ]; then
        log "INFO" "Finally, defragging Leader: $LEADER_URL"
        etcdctl --endpoints="$LEADER_URL" --cacert="$CACERT" --cert="$CERT" --key="$KEY" defrag
    fi
    
    log "INFO" "Rolling Defrag Complete."

  # -------------------------------------------------------------------------
  # 3. Node Cleaner
  # -------------------------------------------------------------------------
  node-cleaner.sh: |
    #!/bin/bash
    set -e
    source /scripts/lib.sh
    MAX_AGE="{{ .Values.config.hygiene.maxTmpFileAge }}"

    log "INFO" "Starting Node Cleaner..."

    # 1. Image Pruning
    if command -v crictl &> /dev/null; then
        log "INFO" "Pruning images via crictl..."
        crictl rmi --prune || log "WARN" "crictl prune returned non-zero"
    elif command -v docker &> /dev/null; then
        log "INFO" "Pruning images via docker..."
        docker system prune -af --volumes || log "WARN" "docker prune returned non-zero"
    else
        log "WARN" "No container runtime CLI found (crictl/docker)."
    fi

    # 2. Tmp Cleanup
    log "INFO" "Cleaning /tmp files older than $MAX_AGE days..."
    # Safety: ensure we are looking at real /tmp (host mount)
    if [ -d "/host/tmp" ]; then
        find /host/tmp -type f -atime +$MAX_AGE -delete
    else
        log "WARN" "/host/tmp not mounted. Cleaning container /tmp (less useful)."
        find /tmp -type f -atime +$MAX_AGE -delete
    fi
    log "INFO" "Node Clean Complete."

  # -------------------------------------------------------------------------
  # 4. Stuck Namespaces
  # -------------------------------------------------------------------------
  stuck-ns.sh: |
    #!/bin/bash
    set -e
    source /scripts/lib.sh
    check_deps kubectl jq

    log "INFO" "Checking for Stuck Namespaces..."
    
    # Get NS in Terminating
    STUCK=$(kubectl get ns -o json | jq -r '.items[] | select(.status.phase=="Terminating") | .metadata.name')
    
    if [ -z "$STUCK" ]; then
        log "INFO" "No stuck namespaces found."
    else
        for ns in $STUCK; do
            log "WARN" "Namespace '$ns' is stuck in Terminating!"
            # Optional: Check resources holding it back
            RESOURCES=$(kubectl api-resources --verbs=list --namespaced -o name | xargs -n 1 kubectl get --show-kind --ignore-not-found -n "$ns" 2>/dev/null)
            if [ -n "$RESOURCES" ]; then
               log "INFO" "Blocking resources in $ns: $RESOURCES"
            fi
        done
    fi

  # -------------------------------------------------------------------------
  # 5. Empty Services
  # -------------------------------------------------------------------------
  empty-svc.sh: |
    #!/bin/bash
    set -e
    source /scripts/lib.sh
    check_deps kubectl jq

    log "INFO" "Audit: Empty Services (No Endpoints)..."
    
    kubectl get endpoints -A -o json | \
      jq -r '.items[] | select((.subsets == null) and (.metadata.name != "kubernetes")) | "WARN: Service \(.metadata.name) (ns: \(.metadata.namespace)) has NO endpoints"' | \
      while read line; do log "$line"; done
      
    log "INFO" "Audit Complete."

  # -------------------------------------------------------------------------
  # 6. Pod Hygiene
  # -------------------------------------------------------------------------
  cleanup-pod-hygiene.sh: |
    #!/bin/bash
    set -e
    source /scripts/lib.sh
    check_deps kubectl jq

    GRACE="{{ .Values.config.hygiene.podGracePeriod }}"
    # Convert "30m" to seconds for older 'date' logic if needed, but kubectl logic here mainly relies on force
    
    log "INFO" "Starting Pod Hygiene (Grace: $GRACE)..."
    
    # 1. Evicted Pods (Reason=Evicted)
    log "INFO" "Deleting Evicted pods..."
    kubectl get pods -A --field-selector=status.phase=Failed -o json | \
      jq -r '.items[] | select(.status.reason=="Evicted") | .metadata.name + " -n " + .metadata.namespace' | \
      while read pod_cmd; do
          log "INFO" "Deleting Evicted: $pod_cmd"
          kubectl delete pod $pod_cmd --wait=false
      done

    # 2. Stuck Terminating (Deleted but still present)
    # Using --force --grace-period=0 is aggressive; usually for "Stuck"
    log "INFO" "Force-deleting stuck terminating pods..."
    kubectl get pods -A -o json | \
      jq -r '.items[] | select(.metadata.deletionTimestamp != null) | .metadata.name + " -n " + .metadata.namespace' | \
      while read pod_cmd; do
          # Check age/stat logic if needed, but usually if it HAS deletionTimestamp it is terminating.
          log "INFO" "Force Removing: $pod_cmd"
          kubectl delete pod $pod_cmd --force --grace-period=0 2>/dev/null || true
      done
      
    log "INFO" "Hygiene Complete."

  # -------------------------------------------------------------------------
  # 7. Check Certs
  # -------------------------------------------------------------------------
  check-certs.sh: |
    #!/bin/bash
    set -e
    source /scripts/lib.sh
    check_deps openssl

    PKI_PATH="{{ .Values.config.pki.path }}"
    WARN_DAYS="{{ .Values.config.pki.warningDays }}"
    
    log "INFO" "Auditing Certificates in $PKI_PATH (< $WARN_DAYS days)..."
    
    if [ ! -d "$PKI_PATH" ]; then
       log "ERROR" "$PKI_PATH not mounted!"
       exit 1
    fi
    
    find "$PKI_PATH" -name "*.crt" | while read cert; do
       # Check if expires in N days
       if openssl x509 -checkend $((WARN_DAYS * 86400)) -noout -in "$cert" > /dev/null; then
          : # Healthy
       else
          ENDDATE=$(openssl x509 -enddate -noout -in "$cert" | cut -d= -f2)
          log "WARN" "EXPIRY RISK: $cert expires on $ENDDATE"
       fi
    done
    log "INFO" "Audit Complete."

  # -------------------------------------------------------------------------
  # 8. GPU Capacity
  # -------------------------------------------------------------------------
  gpu-capacity.sh: |
    #!/bin/bash
    set -e
    source /scripts/lib.sh
    check_deps kubectl

    RES="{{ .Values.config.gpu.resourceName }}"
    
    log "INFO" "Generating GPU Capacity Report ($RES)..."
    
    # Custom Columns for Clean Output
    echo "NODE_NAME           ALLOCATABLE   CAPACITY"
    echo "----------------------------------------"
    kubectl get nodes -o custom-columns=NAME:.metadata.name,ALLOC:.status.allocatable."$RES",CAP:.status.capacity."$RES" | grep -v NAME
    
    # Optional: Aggregate
    TOTAL_CAP=$(kubectl get nodes -o json | jq "[.items[].status.capacity.\"$RES\" | tonumber] | add")
    log "INFO" "Total Cluster Capacity: $TOTAL_CAP"

  # -------------------------------------------------------------------------
  # 9. Orphaned PVCs
  # -------------------------------------------------------------------------
  orphaned-pvc.sh: |
    #!/bin/bash
    set -e
    source /scripts/lib.sh
    check_deps kubectl jq
    
    log "INFO" "Scanning for Orphaned PVCs (Lost/Released)..."
    
    kubectl get pvc -A -o json | \
      jq -r '.items[] | select(.status.phase=="Lost" or .status.phase=="Released") | "WARN: PVC \(.metadata.name) in \(.metadata.namespace) is \(.status.phase)"' | \
      while read line; do log "$line"; done
      
    log "INFO" "Scan Complete."

  # -------------------------------------------------------------------------
  # 10. Restart Analysis
  # -------------------------------------------------------------------------
  restart-analysis.sh: |
    #!/bin/bash
    set -e
    source /scripts/lib.sh
    check_deps kubectl
    
    log "INFO" "Top 20 Unstable Pods (High Restarts)..."
    
    kubectl get pods -A --sort-by='.status.containerStatuses[0].restartCount' -o jsontemplate \
      --template='{{printf "%-20s %-40s %s\n" "NAMESPACE" "POD" "RESTARTS"}}{{range .items}}{{printf "%-20s %-40s %d\n" .metadata.namespace .metadata.name (index .status.containerStatuses 0).restartCount}}{{end}}' | \
      tail -n 20 | tac
      
    log "INFO" "Report Generated."
