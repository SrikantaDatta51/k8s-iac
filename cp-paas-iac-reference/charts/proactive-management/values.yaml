# Default values for proactive-management.

image:
  repository: bitnami/kubectl
  tag: 1.28.15
  pullPolicy: IfNotPresent

schedules:
  etcdSnapshot: "0 1 * * *"      # Nightly 01:00
  # Hourly
  cleanupPodHygiene: "0 * * * *" # Hourly
  checkCerts: "30 * * * *"       # Hourly :30

  # Daily
  etcdDefrag: "30 2 * * *"       # Daily 02:30
  nodeCleaner: "0 4 * * *"       # Daily 04:00
  stuckNs: "0 5 * * *"           # Daily 05:00
  emptySvc: "0 6 * * *"          # Daily 06:00
  etcdSnapshot: "0 1 * * *"      # Daily 01:00 (Updated from Weekly)

  # Weekly
  orphanedPvc: "0 6 * * 0"       # Sunday 06:00
  missingPdb: "0 7 * * 0"        # Sunday 07:00
  nodeChecks: "0 2 * * 0"        # Weekly Sunday 02:00
  
  # Hourly
  restartAnalysis: "0 * * * *"   # Hourly :00
  gpuCapacity: "15 * * * *"      # Hourly :15

config:
  etcdEndpoints: "https://127.0.0.1:2379"
  historyLimit: 3
