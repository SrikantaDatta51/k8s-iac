apiVersion: v1
kind: Service
metadata:
  name: {{ include "node-health-detector.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "node-health-detector.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/name: {{ include "node-health-detector.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "node-health-detector.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "node-health-detector.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "node-health-detector.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  endpoints:
    - port: metrics
      interval: {{ .Values.serviceMonitor.interval | default "30s" }}
      path: /metrics
{{- end }}
